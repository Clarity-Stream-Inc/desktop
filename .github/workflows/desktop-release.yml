name: Desktop Release

# Builds, signs, and publishes the Clarity Stream desktop app
# for macOS (signed + notarized) and Windows (signed) on tag push.
#
# Trigger: push a tag like `desktop-v1.0.0`
#   git tag desktop-v1.0.0 && git push origin desktop-v1.0.0
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   APPLE_CERT_P12_BASE64        base64 of your Developer ID Application .p12
#   APPLE_CERT_PASSWORD          password used when exporting the .p12
#   APPLE_SIGN_IDENTITY          e.g. "Developer ID Application: Your Co (TEAM12345)"
#   APPLE_ID                     Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD  app-specific password from appleid.apple.com
#   APPLE_TEAM_ID                10-char team ID
#   WIN_CSC_LINK                 base64 of Windows code-signing .pfx (optional)
#   WIN_CSC_KEY_PASSWORD         password for the .pfx (optional)
#   GH_TOKEN                     auto-provided by Actions (used to publish release)

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  macos:
    name: Build macOS (signed + notarized)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD:   ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -e
          KEYCHAIN=build.keychain
          KEYCHAIN_PWD=$(uuidgen)
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN
          security import /tmp/cert.p12 -k $KEYCHAIN \
            -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s $KEYCHAIN $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" $KEYCHAIN
          rm /tmp/cert.p12
          security find-identity -v -p codesigning $KEYCHAIN

      - name: Build, sign, and notarize
        env:
          APPLE_SIGN_IDENTITY:         ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
        run: npm run pack:mac

      - name: Create DMG
        run: |
          set -e
          APP_PATH=$(find release -name "Clarity Stream.app" -maxdepth 4 | head -n1)
          mkdir -p dist
          hdiutil create -volname "Clarity Stream" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            dist/ClarityStream.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: desktop/dist/ClarityStream.dmg

  # ─────────────────────────────────────────────────────────────────────
  windows:
    name: Build Windows (signed)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run pack:win

      - name: Sign executable (if certificate provided)
        if: ${{ env.WIN_CSC_LINK != '' }}
        env:
          WIN_CSC_LINK:         ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WIN_CSC_LINK)
          [IO.File]::WriteAllBytes("$env:TEMP\cert.pfx", $bytes)
          $exe = Get-ChildItem -Path release -Recurse -Filter "Clarity Stream.exe" | Select-Object -First 1
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" `
            sign /f "$env:TEMP\cert.pfx" /p $env:WIN_CSC_KEY_PASSWORD `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            $exe.FullName
          Remove-Item "$env:TEMP\cert.pfx"

      - name: Create installer zip
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path release -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "$($src.FullName)\*" -DestinationPath dist\ClarityStream-Setup.zip
          # Rename main exe for predictable download URL
          $exe = Get-ChildItem -Path $src.FullName -Filter "Clarity Stream.exe" | Select-Object -First 1
          Copy-Item $exe.FullName dist\ClarityStream-Setup.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            desktop/dist/ClarityStream-Setup.exe
            desktop/dist/ClarityStream-Setup.zip

  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Clarity Stream Desktop ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/macos/ClarityStream.dmg
            artifacts/windows/ClarityStream-Setup.exe
            artifacts/windows/ClarityStream-Setup.zip
