name: Desktop Release (macOS Signed + Notarized)

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS (signed + notarized)
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build, sign & notarize macOS app
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          CSC_NAME: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-builder,electron-osx-sign*,@electron/notarize*
        run: npx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mac-build
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.blockmap
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: [build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v7
        with:
          name: mac-build
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
